name: lingua_neural_kids_app
description: Language learning app for children
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  backend_core:
    path: packages/backend_core
  shared_ui:
    path: packages/shared_ui
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.0
  speech_to_text: ^7.0.0
  just_audio: ^0.10.0
  provider: ^6.1.0
  audio_session: ^0.2.0
  firebase_core: ^3.15.2
  cloud_firestore: ^5.6.12
  firebase_auth: ^5.3.0
  flutter_tts: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
